[gcode_macro _APPLY_OFFSETS]
gcode:
  {% set mesh_profile = printer.bed_mesh.profile_name %}
  {% set svv = printer.save_variables.variables %}
  {% set offset_x = svv.tool_offset_x|default(0)|float %}
  {% set offset_y = svv.tool_offset_y|default(0)|float %}
  {% set offset_z = svv.tool_offset_z|default(0)|float %}
  {% set last_mesh_profile = svv.last_mesh_profile %}
  G1 Z8.2
  G1 X5 Y5

  SET_GCODE_OFFSET X={offset_x} Y={offset_y} Z={offset_z} MOVE=1

  M118 Offset applied: X={offset_x} Y={offset_y} Z={offset_z}
  M118 old mesh: {last_mesh_profile}

  {% if last_mesh_profile %}
    BED_MESH_PROFILE LOAD={last_mesh_profile}
    M118 Loaded mesh: {last_mesh_profile}
    SAVE_VARIABLE VARIABLE=last_mesh_profile VALUE='""'
  {% endif %}

[gcode_macro _CLEAR_OFFSETS]
gcode:
  {% set mesh_profile = printer.bed_mesh.profile_name %}
  {% if mesh_profile %}
    SAVE_VARIABLE VARIABLE=last_mesh_profile VALUE='"{mesh_profile}"'
    BED_MESH_CLEAR
    M118 Cleared mesh
  {% endif %}
  SET_GCODE_OFFSET X=0 Y=0 Z=0 MOVE=1


[gcode_macro G1]
rename_existing: G1.1 # Rename the existing G1 command to G1.1
gcode:
  {% set p_x = ' X' ~ params.X if 'X' in params else '' %}
  {% set p_y = ' Y' ~ params.Y if 'Y' in params else '' %}
  {% set p_z = ' Z' ~ params.Z if 'Z' in params else '' %}
  {% set p_f = ' F' ~ params.F if 'F' in params else '' %}
  {% set act = params.ACT|int if 'ACT' in params else 0 %}
  {% set align = params.ALIGN if 'ALIGN' in params else 0 %}

  # _APPLY_OFFSETS ALIGN={align}

  {% if act == 1 %}
    # PEN DOWN
    {% set p_z = " Z0.8" %}
  {% elif act == 2 %}
    # PEN UP
    {% set p_z = " Z5" %}
  {% elif act == 3 %}
    # TRAVEL
    {% set p_z = " Z7" %}
  {% endif %}
  {% set ps = p_x + p_y + p_z + p_f %}
  G1.1 {ps}
variable_last_dir: 1

[gcode_macro G2]
rename_existing: G2.1
gcode:
  {% set p_x = ' X' ~ params.X if 'X' in params else '' %}
  {% set p_y = ' Y' ~ params.Y if 'Y' in params else '' %}
  {% set p_z = ' Z' ~ params.Z if 'Z' in params else '' %}
  {% set p_f = ' F' ~ params.F if 'F' in params else '' %}
  {% set p_j = ' J' ~ params.J if 'J' in params else '' %}
  {% set p_i = ' I' ~ params.I if 'I' in params else '' %}
