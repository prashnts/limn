  G28 Z
  UNDOCK
  G1 X65 Y45
  BED_MESH_CALIBRATE_0 {rawparams}
  SET_LED_EFFECT EFFECT=ui_info_processing STOP=1
  

[gcode_macro PROBE_ACCURACY]
rename_existing: PROBE_ACCURACY_0
gcode:
  SET_LED_EFFECT EFFECT=ui_info_processing REPLACE=1
  G28 Z
  LAZY_HOME
  G1 F5000
  G1 X80 Y70
  PROBE_COORDS
