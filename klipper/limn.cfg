[gcode_macro G28]
rename_existing: G28.1
gcode:
  {% set has_axes = 'X' in params or 'Y' in params or 'Z' in params %}

  {% if has_axes %}
    G28.1 {rawparams}
  {% else %}
    G28.1 Z
    G28.1 X
    G28.1 Y
  {% endif %}


