[gcode_macro _DOCK_TOOL]
description: Dock/undock given tool. eg. _DOCK_TOOL T=42 ACT=dock|undock|calibrate
gcode:
  {% set tool_id = params['T']|default(42)|int %}
  {% set prefix = "tool_" ~ tool_id ~ "_" %}
  {% set docking = params['ACT'] == 'dock' %}
  {% set calibrate = 15 if params['ACT'] == 'calibrate' else 0 %}
  {% set dh = printer["gcode_macro _DOCK_HOME"] %}
  {% set effect_name = "docking_" ~ tool_id %}
  {% set mesh_profile = printer.bed_mesh.profile_name %}

  {% if not calibrate %}
    SAVE_GCODE_STATE NAME=DOCK_TOOL_state
  {% endif %}

  {% if mesh_profile %}
    M118 Will restore profile {mesh_profile}
    BED_MESH_CLEAR
  {% endif %}

  G90
  G1 F6000
  M118 {params['ACT']}ing {tool_id}

  # Disable bed mesh as we have a fixed toolhead
  BED_MESH_CLEAR

  STOP_LED_EFFECTS LEDS="neopixel:indockator"
  SET_LED_EFFECT EFFECT={effect_name}

  # Home to tool
  {% if docking %}
    G28
  {% else %}
    G28 Z
    LAZY_HOME
  {% endif %}
  G1 X{dh[prefix + "x"]}
  G1 Y{dh[prefix + "y"]}
  G1 Z{dh[prefix + "z"]}

  QUERY_ENDSTOPS
  K_UNLOCK

  # Switch to relative coords
  G91
  # Slow down
  G1 F2500

  # Move towards threshold
  G1 Z{dh[prefix + "dz"]}
  G1 Y{dh[prefix + "dy"]}
  G1 X{dh[prefix + "dx"] - calibrate}

  # Dock/undock the tool
  {% if docking %}
    K_LOCK
    SAVE_VARIABLE VARIABLE=currently_docked_tool VALUE={params['T']}
  {% elif params['ACT'] == 'undock' %}
    SAVE_VARIABLE VARIABLE=currently_docked_tool VALUE=0
  {% endif %}

  STOP_LED_EFFECTS LEDS="neopixel:indockator"

  {% if calibrate %}
    M118 Start calibration
  {% else %}
    # Move away from threshold
    G1 X-{dh[prefix + "dx"]}
    G1 Y-{dh[prefix + "dy"]}

    # Speed up
    # G1 F2500
    # End relative motion
    G90

    {% if docking %}
      K_LOCK
      RFID_READ

      # Home again
      G28
    {% endif %}

    {% if mesh_profile %}
      BED_MESH_PROFILE LOAD={mesh_profile}
    {% endif %}

    M118 {params['ACT']}ed {tool_id}.
    SET_LED_EFFECT EFFECT=lamp_idle REPLACE=1
    RESTORE_GCODE_STATE NAME=DOCK_TOOL_state
  {% endif %}

[gcode_macro DOCK]
description: Dock given tool. eg. DOCK T=42 [K=70..74]
gcode:
  {% set tool_id = (params.K|int + 1 - 30) if 'T' not in params else params.T|int %}
  {% set svv = printer.save_variables.variables %}
  {% set existing_tool = svv.currently_docked_tool|default(0)|int %}

  {% if existing_tool == tool_id %}
    _BUZZ_DOOP
    M118 Currently Docked: {tool_id}, reading tag...
    LAZY_HOME
    RFID_READ
  {% else %}
    {% if existing_tool > 0 %}
      # Undock if holding a tool
      M118 Undocking EXT:{existing_tool} before docking NEW:{tool_id}.
      _DOCK_TOOL T={existing_tool} ACT=undock
    {% endif %}

    _DOCK_TOOL T={tool_id} ACT=dock
    _BUZZ_DOOP
  {% endif %}

[gcode_macro CAL_DOCK]
description: Calibrate Dock given tool. eg. DOCK T=42
gcode:
  {% set tool_id = params['T']|int %}
  _DOCK_TOOL T={tool_id} ACT=calibrate

[gcode_macro DOCK_RESET]
description: Reset Docking
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set existing_tool = svv.currently_docked_tool|default(0)|int %}
  M118 [Dock][reset] Existing Tool:{existing_tool} cleared.
  SAVE_VARIABLE VARIABLE=currently_docked_tool VALUE=0

[gcode_macro DOCK_RECALL]
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set existing_tool = svv.currently_docked_tool|default(0)|int %}
  M118 [Dock][recall] Existing Tool:{existing_tool}.

[gcode_macro UNDOCK]
description: Dock current tool back to its original position. eg. UNDOCK
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set existing_tool = svv.currently_docked_tool|default(0)|int %}

  LAZY_HOME

  {% if existing_tool == 0 %}
    # Undock if holding a tool
    M118 Nothing to undock.
  {% else %}
    _DOCK_TOOL T={existing_tool} ACT=undock
  {% endif %}

[shell_output sh_output_buffer]


[gcode_macro APPLY_RFID_DATA]
gcode:
  {% set output_buff = printer["shell_output sh_output_buffer"].TAG %}
  {% if "||" not in output_buff %}
    # Do nothing
    SET_LED_EFFECT EFFECT=lamp_idle REPLACE=1
    SET_LED_EFFECT EFFECT=rfid_read_error
    _BUZZ_RFID_ERR
    M118 No tag found.
  {% else %}
    {% set comps = output_buff.split('||') %}
    {% set name = comps[3] if comps|length > 2 else "unknown" %}
    SAVE_VARIABLE VARIABLE=tool_offset_x VALUE={comps[0]}
    SAVE_VARIABLE VARIABLE=tool_offset_y VALUE={comps[1]}
    SAVE_VARIABLE VARIABLE=tool_offset_z VALUE={comps[2]}
    SAVE_VARIABLE VARIABLE=tool_name VALUE='"{name}"'
    SET_LED_EFFECT EFFECT=lamp_idle REPLACE=1
    SET_LED_EFFECT EFFECT=rfid_read_tag_applied
    _BUZZ_RFID_OK
    # M118 Stored offsets for tool.
  {% endif %}


[gcode_macro WRITE_TOOL_TAG]
gcode:
    {% set dx = params.DX %}
    {% set dy = params.DY %}
    {% set dz = params.DZ %}
    {% set name = params.NAME %}
    _RFID_HOME
    EXECUTE_AND_STORE COMMAND="/home/pi/.local/bin/uv run --directory /home/pi/limn rfid.py write-tag --x {dx} --y {dy} --z {dz} --name '{name}'"
    _BUZZ_RFID_OK
    M400
    RFID_READ

[gcode_macro _RFID_HOME]
gcode:
  {% set mesh_profile = printer.bed_mesh.profile_name %}
  {% if mesh_profile %}
    M118 Will restore profile {mesh_profile}
    BED_MESH_CLEAR
  {% endif %}
  SET_LED_EFFECT EFFECT=rfid_read_begin
  LAZY_HOME
  G1 F2500
  G1 X100
  G1 Y3
  G1 X130
  G1 Z7
  M400
  {% if mesh_profile %}
    M118 Restoring profile {mesh_profile}
    BED_MESH_PROFILE LOAD={mesh_profile}
  {% endif %}

[gcode_macro RFID_READ]
gcode:
  # Home to Reading Position
  _RFID_HOME
  EXECUTE_AND_STORE COMMAND="/home/pi/.local/bin/uv run --directory /home/pi/limn rfid.py read-tag"
  M400
  APPLY_RFID_DATA

[gcode_macro _PROBE_TOUCH_CMD]
gcode:
  EXECUTE_AND_STORE COMMAND="/home/pi/.local/bin/uv run --directory /home/pi/limn touchprobe.py  --max-attempts 6 --portstr '/dev/serial/by-id/usb-1a86_USB_Serial-if00-port0,115200'"


[gcode_macro _PROBE_COORDS]
gcode: 
  PROBE
  _BUZZ_TOUCH
  _PROBE_TOUCH_CMD
  G1 Z8

