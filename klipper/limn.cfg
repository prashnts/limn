[gcode_macro _DOCK_TOOL]
description: Dock/undock given tool. eg. _DOCK_TOOL T=42 ACT=dock|undock|calibrate
gcode:
  {% set tool_id = params['T']|default(42)|int %}
  {% set prefix = "tool_" ~ tool_id ~ "_" %}
  {% set docking = params['ACT'] == 'dock' %}
  {% set calibrate = 15 if params['ACT'] == 'calibrate' else 0 %}
  {% set dh = printer["gcode_macro _DOCK_HOME"] %}
  {% set effect_name = "docking_" ~ tool_id %}

  {% if not calibrate %}
    SAVE_GCODE_STATE NAME=DOCK_TOOL_state
  {% endif %}

  G90
  G1 F8000
  M118 {params['ACT']}ing {tool_id}

  STOP_LED_EFFECTS LEDS="neopixel:indockator"
  SET_LED_EFFECT EFFECT={effect_name} REPLACE=1

  # Home to tool
  {% if docking %}
    G28
  {% else %}
    G28 Z
  {% endif %}
  G1 X{dh[prefix + "x"]}
  G1 Y{dh[prefix + "y"]}
  G1 Z{dh[prefix + "z"]}

  # {% if docking %}
  #   K_UNLOCK
  # {% endif %}
  K_UNLOCK

  # Switch to relative coords
  G91
  # Slow down
  G1 F2000

  # Move towards threshold
  G1 Z{dh[prefix + "dz"]}
  G1 Y{dh[prefix + "dy"]}
  G1 X{dh[prefix + "dx"] - calibrate}

  # Dock/undock the tool
  {% if docking %}
    K_LOCK
    SAVE_VARIABLE VARIABLE=currently_docked_tool VALUE={params['T']}
    # Go back a bit fast and forward a bit again

  {% elif params['ACT'] == 'undock' %}
    K_UNLOCK
    SAVE_VARIABLE VARIABLE=currently_docked_tool VALUE=0
  {% endif %}

  STOP_LED_EFFECTS LEDS="neopixel:indockator"

  {% if calibrate %}
    M118 Start calibration
  {% else %}
    # Move away from threshold
    G1 X-{dh[prefix + "dx"]}
    G1 Y-{dh[prefix + "dy"]}

    # Speed up
    G1 F3000
    # End relative motion
    G90

    {% if docking %}
      K_LOCK
      K_LOCK

      # Home again
      G28
      RFID_READ
    {% endif %}

    M118 {params['ACT']}ing {tool_id} Complete.

    RESTORE_GCODE_STATE NAME=DOCK_TOOL_state
  {% endif %}

[gcode_macro DOCK]
description: Dock given tool. eg. DOCK T=42 [K=70..74]
gcode:
  {% set tool_id = (params.K|int + 1 - 30) if 'T' not in params else params.T|int %}
  {% set svv = printer.save_variables.variables %}
  {% set existing_tool = svv.currently_docked_tool|default(0)|int %}

  {% if existing_tool > 0 %}
    # Undock if holding a tool
    M118 Undocking EXT:{existing_tool} before docking NEW:{tool_id}.
    _DOCK_TOOL T={existing_tool} ACT=undock
  {% endif %}

  _DOCK_TOOL T={tool_id} ACT=dock

[gcode_macro CAL_DOCK]
description: Calibrate Dock given tool. eg. DOCK T=42
gcode:
  {% set tool_id = params['T']|int %}
  _DOCK_TOOL T={tool_id} ACT=calibrate

[gcode_macro DOCK_RESET]
description: Reset Docking
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set existing_tool = svv.currently_docked_tool|default(0)|int %}
  M118 [Dock][reset] Existing Tool:{existing_tool} cleared.
  SAVE_VARIABLE VARIABLE=currently_docked_tool VALUE=0

[gcode_macro DOCK_RECALL]
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set existing_tool = svv.currently_docked_tool|default(0)|int %}
  M118 [Dock][recall] Existing Tool:{existing_tool}.

[gcode_macro UNDOCK]
description: Dock current tool back to its original position. eg. UNDOCK
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set existing_tool = svv.currently_docked_tool|default(0)|int %}

  {% if existing_tool == 0 %}
    # Undock if holding a tool
    M118 Nothing to undock.
  {% else %}
    _DOCK_TOOL T={existing_tool} ACT=undock
  {% endif %}

[gcode_macro RFID_READ]
gcode:
  # Home to Reading Position
  G1 X129
  G1 Y3
  G1 Z8

[gcode_macro DOCK_SCAN]
gcode:
  G28
  T0
  T1
  T2
  T3
  T4
  UNDOCK


[gcode_macro PLOT_START]
gcode:
  G28
  DOCK T=42
  G1 Z4

[gcode_macro PLOT_END]
gcode:
  UNDOCK

[gcode_macro PEN_UP]
gcode:
  G91
  G1 Z5
  G90

[gcode_macro PEN_DOWN]
gcode:
  G91
  G1 Z-5
  G90

[gcode_macro DEMO_01]
gcode:
  G28
  K_UNLOCK
  K_LOCK
  DOCK T=42
  UNDOCK
  UNDOCK
  DOCK T=41
  DOCK T=45
  DOCK T=43
  DOCK T=41
  UNDOCK

[gcode_macro DEMO_02]
gcode:
  G28
  DOCK T=42
  UNDOCK



