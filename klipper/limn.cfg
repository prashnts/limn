
[gcode_macro K_LOCK]
gcode:
  MANUAL_STEPPER STEPPER=axis_k ENABLE=1 SET_POSITION=0 MOVE=16
  MANUAL_STEPPER STEPPER=axis_k ENABLE=0
  _BUZZ_K_LOCK
  SET_LED_EFFECT EFFECT=ui_key_locked REPLACE=1

[gcode_macro K_LOCK_UNLOCK_LOCK]
gcode:
  MANUAL_STEPPER STEPPER=axis_k ENABLE=1 SET_POSITION=0 MOVE=10
  MANUAL_STEPPER STEPPER=axis_k ENABLE=1 SET_POSITION=16 MOVE=8
  MANUAL_STEPPER STEPPER=axis_k ENABLE=1 SET_POSITION=0 MOVE=16
  MANUAL_STEPPER STEPPER=axis_k ENABLE=0
  _BUZZ_K_LOCK
  SET_LED_EFFECT EFFECT=ui_key_locked REPLACE=1

[gcode_macro K_UNLOCK]
gcode:
  {% set lock_status = printer.query_endstops.last_query['manual_stepper axis_k'] %}
  # {% if not lock_status %}
  {% if True %}
    MANUAL_STEPPER STEPPER=axis_k ENABLE=1 SET_POSITION=16 MOVE=0
    MANUAL_STEPPER STEPPER=axis_k ENABLE=0
    _BUZZ_K_UNLOCK
  {% else %}
    _BUZZ_K_SKIPUNLOCK
  {% endif %}
  SET_LED_EFFECT EFFECT=ui_key_unlocked REPLACE=1


[gcode_macro LAZY_HOME]
gcode:
  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_0
gcode:
