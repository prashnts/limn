
[gcode_macro K_LOCK]
gcode:
  SET_LED_EFFECT EFFECT=lamp_idle REPLACE=1
  SET_LED_EFFECT EFFECT=locking_key
  MANUAL_STEPPER STEPPER=axis_k ENABLE=1 SET_POSITION=0 MOVE=16
  MANUAL_STEPPER STEPPER=axis_k ENABLE=0
  _BUZZ_K_LOCK

[gcode_macro K_UNLOCK]
gcode:
  SET_LED_EFFECT EFFECT=lamp_idle REPLACE=1
  SET_LED_EFFECT EFFECT=unlocking_key
  {% set lock_status = printer.query_endstops.last_query['manual_stepper axis_k'] %}
  {% if not lock_status %}
    MANUAL_STEPPER STEPPER=axis_k ENABLE=1 SET_POSITION=16 MOVE=0
    MANUAL_STEPPER STEPPER=axis_k ENABLE=0
    _BUZZ_K_UNLOCK
  {% else %}
    _BUZZ_K_SKIPUNLOCK
  {% endif %}


[gcode_macro LAZY_HOME]
gcode:
  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_0
gcode:
  G28 Z
  UNDOCK
  G1 X60 Y45
  BED_MESH_CALIBRATE_0 {rawparams}

[gcode_macro PROBE_ACCURACY]
rename_existing: PROBE_ACCURACY_0
gcode:
  G28 Z
  LAZY_HOME
  G1 X75 Y70
  _PROBE_COORDS
  PROBE_ACCURACY_0 {raw_params}
  _PROBE_COORDS

[gcode_macro _APPLY_OFFSETS]
gcode:
  {% set align = params.ALIGN|int %}
  {% set svv = printer.save_variables.variables %}
  {% set offset_x = svv.tool_offset_x|default(0)|int %}
  {% set offset_y = svv.tool_offset_y|default(0)|int %}
  {% set offset_z = svv.tool_offset_z|default(0)|int %}

  {% if align == 1 %}
    SET_GCODE_OFFSET X={offset_x} Y={offset_y} Z={offset_z}
  {% else %}
    SET_GCODE_OFFSET X=0 Y=0 Z=0
  {% endif %}

[gcode_macro G1]
rename_existing: G1.1 # Rename the existing G1 command to G1.1
gcode:
  {% set p_x = ' X' ~ params.X if 'X' in params else '' %}
  {% set p_y = ' Y' ~ params.Y if 'Y' in params else '' %}
  {% set p_z = ' Z' ~ params.Z if 'Z' in params else '' %}
  {% set p_f = ' F' ~ params.F if 'F' in params else '' %}
  {% set act = params.ACT|int if 'ACT' in params else 0 %}
  {% set align = params.ALIGN if 'ALIGN' in params else 0 %}

  _APPLY_OFFSETS ALIGN={align}

  {% if act == 1 %}
    # PEN DOWN
    {% set p_z = " Z1" %}
  {% elif act == 2 %}
    # PEN UP
    {% set p_z = " Z5" %}
  {% elif act == 3 %}
    # TRAVEL
    {% set p_z = " Z7" %}
  {% endif %}
  {% set ps = p_x + p_y + p_z + p_f %}
  G1.1 {ps}
variable_last_dir: 1

[gcode_macro G2]
rename_existing: G2.1
gcode:
  {% set p_x = ' X' ~ params.X if 'X' in params else '' %}
  {% set p_y = ' Y' ~ params.Y if 'Y' in params else '' %}
  {% set p_z = ' Z' ~ params.Z if 'Z' in params else '' %}
  {% set p_f = ' F' ~ params.F if 'F' in params else '' %}
  {% set p_j = ' J' ~ params.J if 'J' in params else '' %}
  {% set p_i = ' I' ~ params.I if 'I' in params else '' %}
  {% set align = params.ALIGN if 'ALIGN' in params else 0 %}
  _APPLY_OFFSETS ALIGN={align}
  {% set ps = p_x + p_y + p_z + p_i + p_j + p_f %}
  G2.1 {ps}

[gcode_macro G3]
rename_existing: G3.1
gcode:
  {% set p_x = ' X' ~ params.X if 'X' in params else '' %}
  {% set p_y = ' Y' ~ params.Y if 'Y' in params else '' %}
  {% set p_z = ' Z' ~ params.Z if 'Z' in params else '' %}
  {% set p_f = ' F' ~ params.F if 'F' in params else '' %}
  {% set p_j = ' J' ~ params.J if 'J' in params else '' %}
  {% set p_i = ' I' ~ params.I if 'I' in params else '' %}
  {% set align = params.ALIGN if 'ALIGN' in params else 0 %}
  _APPLY_OFFSETS ALIGN={align}
  {% set ps = p_x + p_y + p_z + p_i + p_j + p_f %}
  G3.1 {ps}


