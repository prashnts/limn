[gcode_macro _DOCK_TOOL]
description: Dock/undock given tool. eg. _DOCK_TOOL T=42 ACT=dock|undock|calibrate
gcode:
  {% set tool_id = params['T']|default(42)|int %}
  {% set prefix = "tool_" ~ tool_id ~ "_" %}
  {% set docking = params['ACT'] == 'dock' %}
  {% set calibrate = 15 if params['ACT'] == 'calibrate' else 0 %}
  {% set dh = printer["gcode_macro _DOCK_HOME"] %}
  {% set effect_name = "docking_" ~ tool_id %}
  {% set effect_2_name = "ui_docked_tool_" ~ tool_id %}
  {% set mesh_profile = printer.bed_mesh.profile_name %}

  SAVE_GCODE_STATE NAME=DOCK_TOOL_state

  SET_LED_EFFECT EFFECT=ui_tool_sweep STOP=1
  SET_LED_EFFECT EFFECT=ui_alert_blink
  SET_LED_EFFECT EFFECT=ui_traffic_red
  SET_LED_EFFECT EFFECT=ui_rfid_read_begin REPLACE=1
  SET_LED_EFFECT EFFECT=ui_rfid_read_begin STOP=1

  SET_LED_EFFECT EFFECT={effect_2_name} REPLACE=1 COL=yellow

  G90
  G1 F6000
  M118 {params['ACT']}ing {tool_id}

  # Disable bed mesh as we have a fixed toolhead
  _CLEAR_OFFSETS

  SET_LED_EFFECT EFFECT={effect_name} REPLACE=1

  # Home to tool
  {% if docking %}
    G28
  {% else %}
    G28 Z
    LAZY_HOME
  {% endif %}
  G1 F5500
  
  G1 X{dh[prefix + "x"]} Y{dh[prefix + "y"]}
  G1 Z{dh[prefix + "z"]}

  SET_LED_EFFECT EFFECT=ui_traffic_yellow
  QUERY_ENDSTOPS
  M400
  K_UNLOCK

  # Switch to relative coords
  G91

  # Move towards threshold
  G1 Z{dh[prefix + "dz"]}
  G1 Y{dh[prefix + "dy"]}
  G1 X{dh[prefix + "dx"] / 2}

  # Slow down
  G1 F2500
  SET_LED_EFFECT EFFECT=ui_traffic_red STOP=1
  SET_LED_EFFECT EFFECT=ui_traffic_green
  G1 X{dh[prefix + "dx"] / 2}

  # Dock/undock the tool
  {% if docking %}
    G1 F1500
    # Nudge
    G1 Z0.5 Y-0.5 X-0.5
    G1 X0.5 Y0.5
    G1 Z-0.5
    K_LOCK_UNLOCK_LOCK
    SAVE_VARIABLE VARIABLE=currently_docked_tool VALUE={params['T']}
    SET_LED_EFFECT EFFECT={effect_2_name} REPLACE=1 COL=white
  {% elif params['ACT'] == 'undock' %}
    SAVE_VARIABLE VARIABLE=currently_docked_tool VALUE=0
    SAVE_VARIABLE VARIABLE=tool_offset_x VALUE=0
    SAVE_VARIABLE VARIABLE=tool_offset_y VALUE=0
    SAVE_VARIABLE VARIABLE=tool_offset_z VALUE=0
    SAVE_VARIABLE VARIABLE=tool_name VALUE='""'
    SET_LED_EFFECT EFFECT={effect_2_name} REPLACE=1 COL=red
    SET_LED_EFFECT EFFECT={effect_2_name} STOP=1
  {% endif %}

  SET_LED_EFFECT EFFECT=ui_traffic_yellow STOP=1
  SET_LED_EFFECT EFFECT=ui_traffic_green

  # Move away from threshold
  G1 F2000

  G1 X-{dh[prefix + "dx"]}
  G1 Y-{dh[prefix + "dy"]}

  # Speed up
  G1 F4500
  # G1 F2500
  # End relative motion
  G90

  {% if docking %}
    # After picking up the tool
    K_LOCK_UNLOCK_LOCK
    SET_LED_EFFECT EFFECT=ui_alert_blink STOP=1
    RFID_READ
    G28
  {% endif %}
  _APPLY_OFFSETS

  M118 {params['ACT']}ed {tool_id}.

  SET_LED_EFFECT EFFECT={effect_name} STOP=1
  SET_LED_EFFECT EFFECT=ui_traffic_green STOP=1
  SET_LED_EFFECT EFFECT=ui_rfid_read_tag_applied STOP=1
  RESTORE_GCODE_STATE NAME=DOCK_TOOL_state

[gcode_macro DOCK]
description: Dock given tool. eg. DOCK T=42 [K=70..74]
gcode:
  {% set tool_id = (params.K|int + 1 - 30) if 'T' not in params else params.T|int %}
  {% set svv = printer.save_variables.variables %}
  {% set existing_tool = svv.currently_docked_tool|default(0)|int %}
  {% set effect_2_name = "ui_docked_tool_" ~ tool_id %}
  {% set existing = "ui_docked_tool_" ~ existing_tool %}

  {% if existing_tool == tool_id %}
    _BUZZ_DOOP
    M118 Currently Docked: {tool_id}, reading tag...
    LAZY_HOME
    RFID_READ
    _APPLY_OFFSETS
  {% else %}
    {% if existing_tool > 0 %}
      # Undock if holding a tool
      SET_LED_EFFECT EFFECT={existing} REPLACE=1
      M118 Undocking EXT:{existing_tool} before docking NEW:{tool_id}.
      _DOCK_TOOL T={existing_tool} ACT=undock
      SET_LED_EFFECT EFFECT={existing} STOP=1
    {% endif %}

    _DOCK_TOOL T={tool_id} ACT=dock
    _BUZZ_DOOP
  {% endif %}

[gcode_macro DOCK_RESET]
description: Reset Docking
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set existing_tool = svv.currently_docked_tool|default(0)|int %}
  M118 [Dock][reset] Existing Tool:{existing_tool} cleared.
  SAVE_VARIABLE VARIABLE=currently_docked_tool VALUE=0
  SAVE_VARIABLE VARIABLE=tool_offset_x VALUE=0
  SAVE_VARIABLE VARIABLE=tool_offset_y VALUE=0
  SAVE_VARIABLE VARIABLE=tool_offset_z VALUE=0
  SAVE_VARIABLE VARIABLE=tool_name VALUE='""'
  _BUZZ_DOOP

[gcode_macro DOCK_RECALL]
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set existing_tool = svv.currently_docked_tool|default(0)|int %}
  M118 [Dock][recall] Existing Tool:{existing_tool}.
  _BUZZ_DOOP

[gcode_macro UNDOCK]
description: Dock current tool back to its original position. eg. UNDOCK
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set existing_tool = svv.currently_docked_tool|default(0)|int %}

  LAZY_HOME

  {% if existing_tool == 0 %}
    # Undock if holding a tool
    M118 Nothing to undock.
  {% else %}
    _DOCK_TOOL T={existing_tool} ACT=undock
  {% endif %}

[shell_output sh_output_buffer]

[limn]
serial: /dev/serial/by-id/usb-MicroPython_Board_in_FS_mode_e6625887d3390f34-if00
baud: 115200

[gcode_macro LRT_READ_SAMPLES]
gcode:
  {% set output_buff = printer["limn"].samples %}
  M118 {output_buff}


[gcode_macro APPLY_RFID_DATA]
gcode:
  {% set output_buff = printer["shell_output sh_output_buffer"].TAG %}
  {% if "||" not in output_buff %}
    # Do nothing
    SET_LED_EFFECT EFFECT=ui_rfid_read_error REPLACE=1
    SET_LED_EFFECT EFFECT=ui_alert_blink REPLACE=1
    _BUZZ_RFID_ERR
    M118 No tag found.
  {% else %}
    {% set comps = output_buff.split('||') %}
    {% set name = comps[3] if comps|length > 2 else "unknown" %}
    SAVE_VARIABLE VARIABLE=tool_offset_x VALUE={comps[0]}
    SAVE_VARIABLE VARIABLE=tool_offset_y VALUE={comps[1]}
    SAVE_VARIABLE VARIABLE=tool_offset_z VALUE={comps[2]}
    SAVE_VARIABLE VARIABLE=tool_name VALUE='"{name}"'
    SET_LED_EFFECT EFFECT=ui_rfid_read_tag_applied REPLACE=1
    _BUZZ_RFID_OK
  {% endif %}


[gcode_macro WRITE_TOOL_TAG]
gcode:
    {% set dx = ' --x ' ~ params.DX if 'DX' in params else '' %}
    {% set dy = ' --y ' ~ params.DY if 'DY' in params else '' %}
    {% set dz = ' --z ' ~ params.DZ if 'DZ' in params else '' %}
    {% set name = ' --name "' ~ params.NAME ~ '"' if 'NAME' in params else '' %}
    _RFID_HOME
    EXECUTE_AND_STORE COMMAND="/home/pi/.local/bin/uv run --directory /home/pi/limn rfid.py write-tag {dx} {dy} {dz} {name}"
    _BUZZ_RFID_OK
    M400
    G1 Z8
    RFID_READ

[gcode_macro _RFID_HOME]
gcode:
  {% set mesh_profile = printer.bed_mesh.profile_name %}
  {% set svv = printer.save_variables.variables %}
  {% set existing_tool = svv.currently_docked_tool|default(0)|int %}
  {% set effect_2_name = "ui_docked_tool_" ~ existing_tool %}
  SET_LED_EFFECT EFFECT={effect_2_name}
  _CLEAR_OFFSETS
  LAZY_HOME
  G1 F5000
  G1 X100
  G1 Y3
  G1 X135
  G1 Z7
  M400

[gcode_macro RFID_READ]
gcode:
  # Home to Reading Position
  SET_LED_EFFECT EFFECT=ui_rfid_read_begin
  _RFID_HOME
  EXECUTE_AND_STORE COMMAND="/home/pi/.local/bin/uv run --directory /home/pi/limn rfid.py read-tag"
  M400
  SET_LED_EFFECT EFFECT=ui_rfid_read_begin STOP=1
  G1 Z8
  APPLY_RFID_DATA
  _APPLY_OFFSETS

[gcode_macro DOCK_SCAN]
