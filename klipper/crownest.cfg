#### crowsnest.conf
#### This is the default config after installation.
#### It is also used as the default config in MainsailOS.
#### For details on how to configure this to your needs, see:
#### https://github.com/mainsail-crew/crowsnest/blob/master/README.md


#####################################################################
####                                                            #####
####      Information about ports and according URL's           #####
####                                                            #####
#####################################################################
####                                                            #####
####    Port 8080 equals /webcam/?action=[stream/snapshot]      #####
####    Port 8081 equals /webcam2/?action=[stream/snapshot]     #####
####    Port 8082 equals /webcam3/?action=[stream/snapshot]     #####
####    Port 8083 equals /webcam4/?action=[stream/snapshot]     #####
####                                                            #####
####    Note: These ports are default for most Mainsail         #####
####    installations. Using any other port would involve       #####
####    changing the proxy configuration or using URLs          #####
####    with the specific port like                             #####
####    http://<ip>:<port>/?action=[stream/snapshot]            #####
####                                                            #####
#####################################################################
####    RTSP Stream URL: ( if enabled and supported )           #####
####    rtsp://<ip>:<rtsp_port>/stream.h264                     #####
#####################################################################


[crowsnest]
log_path: /home/pi/printer_data/logs/crowsnest.log
log_level: verbose                      # Valid Options are quiet/verbose/debug
delete_log: false                       # Deletes log on every restart, if set to true
no_proxy: false                         # If set to true, no reverse proxy is required. Only change this, if you know what you are doing.

[cam libcamera]
mode: camera-streamer                         # ustreamer - Provides MJPG and snapshots. (All devices)
                                        # camera-streamer - Provides WebRTC, MJPG and snapshots. (only RPiOS + RPi 0/1/2/3/4)
port: 8080                              # HTTP/MJPG stream/snapshot port
# device: /base/soc/i2c0mux/i2c@0/imx477@1a                     # See log for available devices
device: /base/soc/i2c0mux/i2c@0/imx708@1a
resolution: 1304x1296                  # <width>x<height> format
max_fps: 15                             # If hardware supports it, it will be forced, otherwise ignored/coerced.
#custom_flags:                          # You can run the stream services with custom flags.
# v4l2ctl:                               # Add v4l2-ctl parameters to setup your camera, see log for your camera capabilities.
# v4l2ctl: afmode=2
v4l2ctl: afmode=0, afrange=1, hdrmode=4, lensposition=5.5, AeConstraintMode=0, AeEnable=1, AeMeteringMode=0, Sharpness=10


[cam usbcam]
mode: ustreamer                         # ustreamer - Provides MJPG and snapshots. (All devices)
port: 8081                              # HTTP/MJPG stream/snapshot port
device: /dev/v4l/by-id/usb-Innomaker_Innomaker-U20CAM-1080p-S1_SN0001-video-index0
resolution: 1920x1080                  # <width>x<height> format
max_fps: 30
v4l2ctl: white_balance_automatic=0, white_balance_temperature=4600, auto_exposure=1, exposure_time_absolute=250, sharpness=4

[cam usbafcam]
# AUTOFOCUS CAM - Y AXIS
mode: ustreamer
port: 8082
device: /dev/v4l/by-id/usb-Gerenic_USB_2.0_Camera_200901010001-video-index0
resolution: 1600x1200
max_fps: 30                             # If hardware supports it, it will be forced, otherwise ignored/coerced.
v4l2ctl: sharpness=-2,focus_automatic_continuous=1,saturation=72,contrast=40,gamma=400,gain=70

[cam usbircam]
mode: ustreamer
port: 8083
device: /dev/v4l/by-id/usb-InnoMaker_Innomaker-U20CAM-1080PD_N-S1_20010101-video-index0
resolution: 800x600
max_fps: 30                             # If hardware supports it, it will be forced, otherwise ignored/coerced.
v4l2ctl: rotate=90

